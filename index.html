<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayCounter.pro - Free Anniversary & Countdown Tracker</title>
    <meta name="description" content="Track anniversaries, count down to birthdays, calculate days since events. Free with ICS calendar export. Multi-language.">
    <meta name="keywords" content="day counter, anniversary tracker, countdown, days since, birthday">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #faf5ff 0%, #ede9fe 50%, #e0e7ff 100%); min-height: 100vh; }
        h1, h2, h3, .font-display { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #818cf8); }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-4px); }
        .countdown-number { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 4rem; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @media (min-width: 768px) { .countdown-number { font-size: 6rem; } }
        .ad-placeholder { background: repeating-linear-gradient(45deg, #f3f4f6, #f3f4f6 10px, #e5e7eb 10px, #e5e7eb 20px); }
        .mood-btn:hover { transform: scale(1.1); }
        .mood-btn.selected { transform: scale(1.15); box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-purple-100">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center text-white font-bold text-xl">D</div>
                <span class="font-display font-bold text-xl gradient-text">DayCounter.pro</span>
            </a>
            <div class="flex items-center gap-4">
                <select id="langSelector" class="px-3 py-2 border border-gray-300 rounded-lg text-sm cursor-pointer" onchange="changeLanguage(this.value)">
                    <option value="en">🇺🇸 EN</option>
                    <option value="zh">🇨🇳 中文</option>
                    <option value="es">🇪🇸 ES</option>
                    <option value="ja">🇯🇵 日本語</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="max-w-6xl mx-auto px-4 py-12 md:py-20 text-center">
        <h1 class="font-display text-4xl md:text-6xl font-bold mb-4">
            <span data-i18n="hero_title_1">Track Your </span><span class="gradient-text" data-i18n="hero_title_2">Special Days</span>
        </h1>
        <p class="text-gray-600 text-lg md:text-xl max-w-2xl mx-auto mb-8" data-i18n="hero_desc">Count down to birthdays, anniversaries, and special moments. Simple, beautiful, free.</p>
        <a href="#countdown" class="btn-primary inline-block text-white px-8 py-3 rounded-full font-medium" data-i18n="hero_btn_countdown">Start Countdown</a>
    </section>

    <!-- Countdown -->
    <section id="countdown" class="max-w-4xl mx-auto px-4 py-12">
        <div class="card p-6 md:p-10">
            <h2 class="font-display text-2xl md:text-3xl font-bold mb-8" data-i18n="countdown_title">⏰ Countdown To Special Day</h2>
            
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="countdown_event_label">Event Name</label>
                    <input type="text" id="eventName" data-i18n-placeholder="countdown_event_placeholder" placeholder="e.g. My Birthday..." class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="countdown_date_label">Target Date</label>
                    <input type="date" id="targetDate" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none">
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="mood_label">How are you feeling?</label>
                <div class="flex flex-wrap gap-3">
                    <button onclick="selectMood('happy')" class="mood-btn text-3xl p-3 rounded-xl bg-white hover:bg-gray-50" data-mood="happy">😊</button>
                    <button onclick="selectMood('sad')" class="mood-btn text-3xl p-3 rounded-xl bg-white hover:bg-gray-50" data-mood="sad">😢</button>
                    <button onclick="selectMood('anxious')" class="mood-btn text-3xl p-3 rounded-xl bg-white hover:bg-gray-50" data-mood="anxious">😰</button>
                    <button onclick="selectMood('excited')" class="mood-btn text-3xl p-3 rounded-xl bg-white hover:bg-gray-50" data-mood="excited">🤩</button>
                    <button onclick="selectMood('peaceful')" class="mood-btn text-3xl p-3 rounded-xl bg-white hover:bg-gray-50" data-mood="peaceful">😌</button>
                    <button onclick="selectMood('love')" class="mood-btn text-3xl p-3 rounded-xl bg-white hover:bg-gray-50" data-mood="love">🥰</button>
                </div>
            </div>
            
            <button onclick="calculateCountdown()" class="btn-primary text-white px-8 py-3 rounded-full font-medium" data-i18n="countdown_btn">Calculate</button>
            
            <div id="result" class="hidden mt-8 bg-gradient-to-r from-indigo-50 to-pink-50 rounded-2xl p-8 text-center">
                <p class="text-gray-600 mb-2" data-i18n="countdown_result_label">Days until</p>
                <div class="countdown-number" id="days">0</div>
                <p class="text-gray-500 text-sm mt-2" id="dateDisplay"></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-6xl mx-auto px-4 py-8 text-center">
            <p class="text-gray-400 text-sm" data-i18n="footer_copyright">© 2026 DayCounter.pro</p>
        </div>
    </footer>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-lg hidden z-50">
    </div>

    <script src="js/lang.js"></script>
    <script>
        let selectedMood = null;
        
        function selectMood(mood) {
            selectedMood = mood;
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }
        
        function calculateCountdown() {
            const date = document.getElementById('targetDate').value;
            if (!date) {
                showToast(t('error_select_date'));
                return;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const days = Math.floor((new Date(date) - new Date(today)) / (1000 * 60 * 60 * 24));
            
            document.getElementById('days').textContent = Math.max(0, days);
            document.getElementById('dateDisplay').textContent = new Date(date).toLocaleDateString();
            document.getElementById('result').classList.remove('hidden');
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        // Initialize language on page load
        document.addEventListener('DOMContentLoaded', function() {
            initLanguage();
        });
    </script>
</body>
</html>
